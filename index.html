
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mohammadi Online Quran Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Amiri+Quran&family=Scheherazade+New:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0a0f2b; /* Brighter Deep Navy */
        scroll-behavior: smooth;
      }
      .font-arabic {
        font-family: 'Amiri', serif;
      }
      .font-quran {
        font-family: 'Amiri Quran', 'Scheherazade New', 'Amiri', serif;
        font-weight: 400;
      }
      /* Custom scrollbar for better aesthetics */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0f2b;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #38bdf8;
      }
      /* Smooth glow effect */
      .shadow-glow {
        box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
      }
      /* Custom scrollbar for Quran components */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(56, 189, 248, 0.3);
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(56, 189, 248, 0.5);
      }
      /* All form inputs should have white text for dark theme */
      input:not([type="checkbox"]):not([type="radio"]),
      textarea,
      select {
        color: #ffffff !important;
      }
      /* Select dropdown options should also be white */
      select option {
        color: #ffffff !important;
        background-color: #1e293b !important;
      }
      input::placeholder,
      textarea::placeholder {
        color: #9ca3af !important;
      }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="text-slate-100 antialiased">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
